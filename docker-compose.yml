services:
  db:
    image: postgres:16-alpine
    container_name: vitalai_db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vitalai}
      POSTGRES_USER: ${POSTGRES_USER:-vitalai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d   # SQL scripts run on first start
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vitalai} -d ${POSTGRES_DB:-vitalai}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vitalai_net

volumes:
  postgres_data:

networks:
  vitalai_net:
    driver: bridge
